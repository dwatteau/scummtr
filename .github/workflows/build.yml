name: Build for most common platforms

on:
  schedule:
    # Monthly run (UTC time) -- only on default branch
    - cron: '34 12 2 * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'CMakeLists.txt'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'CMakeLists.txt'
      - 'src/**'

# Cancel any currently running builds on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENABLE_LTO: 'ON'

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # TODO: reuse my ScummVM CI trick to use an even older GCC?
          - name: 'Ubuntu 22.04 (arm64, oldest g++)'
            os: ubuntu-22.04-arm
            buildtype: 'Release'
            gccver: 9
            extraargs: '-DCMAKE_CXX_COMPILER=g++-9'
          - name: 'Ubuntu 24.04 (newest g++)'
            os: ubuntu-24.04
            buildtype: 'Release'
            gccver: 14
            extraargs: '-DCMAKE_CXX_COMPILER=g++-14'
          - name: 'Windows Server 2022 (win32)'
            os: windows-2022
            buildtype: 'RelWithDebInfo'
            extraargs: '-DCMAKE_GENERATOR_PLATFORM=Win32'
          - name: 'Windows Server 2025 (x64)'
            os: windows-2025
            buildtype: 'RelWithDebInfo'
            extraargs: '-DCMAKE_GENERATOR_PLATFORM=x64'
          - name: 'macOS 14 (x86_64-arm64 / newest Xcode)'
            os: macos-14
            buildtype: 'Release'
            extraargs: '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"'

    steps:
      - uses: actions/checkout@v6

      - name: 'Install different g++ release (Ubuntu only)'
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gccver }}

      - name: 'Install Debian devscripts (Ubuntu-24.04 only)'
        if: startsWith(matrix.os, 'ubuntu-24.04')
        run: |
          sudo apt-get install -y --no-install-recommends devscripts

      - name: 'Switch to newest available Xcode (macOS only)'
        if: startsWith(matrix.os, 'macos')
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"
          system_profiler SPDeveloperToolsDataType

      - name: Print CMake version
        run: cmake --version

      - name: Configure for ${{ matrix.buildtype }}
        run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} -DENABLE_LTO=${{env.ENABLE_LTO}} ${{ matrix.extraargs }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build -j1
#        env:
#          VERBOSE: 1

      # TODO: Look at https://github.com/microsoft/binskim as well?
      - name: 'Run hardening-check on main binary (Ubuntu-24.04 only)'
        if: startsWith(matrix.os, 'ubuntu-24.04')
        run: |
          hardening-check ${{github.workspace}}/build/bin/scummtr
